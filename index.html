<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>위수협의</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #f5f5f5;
  }
  header {
    background: #222;
    color: #fff;
    padding: 10px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    margin: 0;
    font-size: 20px;
  }
  main {
    background: #fff;
    min-height: 70vh;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .season-container {
	text-align: center;
    max-width: 600px;
    width: 100%;
  }
  .season-card-list {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(240px,1fr));
    gap: 20px;
    margin-top: 20px;
  }
  .season-card {
    background: #eee;
    border-radius: 6px;
    padding: 20px;
    box-shadow: 1px 1px 6px rgba(0,0,0,0.1);
    text-align: center;
  }
  .season-card h2 {
    margin-top: 0;
    margin-bottom: 10px;
    font-size: 18px;
  }
  .season-card p {
    margin: 0 0 15px;
    font-size: 14px;
    color: #555;
  }
  .season-card a {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 4px;
    text-decoration: none;
    background: #337ab7;
    color: #fff;
    font-size: 14px;
  }
  .season-card a:hover {
    background: #285f90;
  }
  footer {
    text-align: center;
    padding: 10px 0 20px;
    font-size: 12px;
    color: #777;
  }
</style>
</head>
<body>
<header>
  <h1>위수협의</h1>
</header>

<main>
  <div class="season-container">
    <h2>시즌 선택</h2>

    <div class="season-card-list">
      <div class="season-card">
        <h2>위수 협의: 맹약/상반기</h2>
        <p>2025-11-14 ~ 2025-12-12 (중섭)</p>
        <a href="season2.html">이동</a>
      </div>

      <div class="season-card">
        <h2>위수 협의: 맹약/하반기</h2>
        <p>2026-03-14 ~ 2026-04-25 (중섭)</p>
        <a href="season3.html">이동</a>
      </div>

      <div class="season-card">
        <h2>위수 협의: 맹약</h2>
        <p>2026-04-28 ~ 2026-05-25 (한섭)</p>
        <a href="season2kr.html">이동</a>
      </div>
    </div>
  </div>
</main>

<footer>
  본 사이트의 모든 명일방주 관련 콘텐츠는 Hypergryph의 저작물입니다.
</footer>
</body>
</html>
